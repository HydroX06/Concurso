<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¿Quién quiere ser Millonario? - Clase Edition</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1>¿Quién quiere ser Millonario? 🧠</h1>
    <div class="game">
    <div class="stats">
    <p>💰 Dinero: <span id="money">0</span> €</p>
    <p>❤️ Vidas: <span id="lives">3</span></p>
    <p>⏱ Tiempo: <span id="timer">30</span>s</p>
    </div>
    <div class="questionBox">
    <h2 id="question">Pulsa empezar</h2>
    <div id="answers"></div>
    </div>

    <div class="controls">
    <button onclick="startGame()">Empezar</button>
    <button onclick="stand()">Plantarse</button>
    </div>

    <h3>Comodines</h3>

    <div class="lifelines">
    <button onclick="use5050()">50:50</button>
    <button onclick="changeQuestion()">Cambiar pregunta</button>
    <button onclick="extraTime()">+Tiempo</button>
    <button onclick="shield()">Doble oportunidad</button>
    </div>

    <h3>Potenciadores (ANTES de ver pregunta)</h3>

    <div class="boosters">
    <button onclick="extraAnswers()">Añadir respuestas</button>
    <button onclick="doublePoints()">Doble puntuación</button>
    <button onclick="rouletteMode()">Modo ruleta</button>
    </div>

    </div>

    <script src="script.js"></script>

<!--Instalarse el toolbox y code with me en casa-->
</body>
</html>
